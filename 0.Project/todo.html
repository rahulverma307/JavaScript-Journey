<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo</title>
</head>
<body>
    <div>
        <input id="todoinput" type="text" placeholder="Enter Your task Here">
        <button id="createBtn">Create</button>
    </div>
    <div>
        <ul id="todoContainer">
        </ul>
    </div>
    <script>
       const createButtonRef=document.getElementById("createBtn");

       const todoInpuRef=document.getElementById("todoinput")

       let todoContainerRef=document.getElementById("todoContainer")

       (async ()=>{
          fetch("https://api.freeapi.app/api/v1/public/quotes",{
            method:'GET',
        })
       })()

       createButtonRef.addEventListener('click',function () {
        let value = todoInpuRef.value;
        const li=document.createElement('li')
        li.innerText=value;
        li.addEventListener('click',function(){
         li.remove();
        })
        todoContainerRef.appendChild(li)
        todoInpuRef.value=""
       })


    </script>
</body>
</html>
